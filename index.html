    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Quicksand:wght@500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* Typography */
        .font-title { font-family: 'Fredoka', sans-serif; }
        .font-quicksand { font-family: 'Quicksand', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }

        /* Animated Mesh Gradient Background */
        body {
            background: linear-gradient(-45deg, #fce4ec, #f3e5f5, #fff0f5, #e8eaf6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Fluid Animations */
        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-3px) scale(1.01); }
        }
        .animate-breathe {
            animation: breathe 4s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes float-gentle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .animate-float {
            animation: float-gentle 6s ease-in-out infinite;
        }

        /* Background Decorations Floating Animation */
        @keyframes float-bg {
            0%, 100% { transform: translateY(0px) rotate(var(--r-start)); }
            50% { transform: translateY(-15px) rotate(var(--r-end)); }
        }
        .animate-float-bg { animation: float-bg 9s ease-in-out infinite; }
        .animate-float-bg-delayed { animation: float-bg 12s ease-in-out infinite 2.5s; }
        .animate-float-bg-slow { animation: float-bg 14s ease-in-out infinite 1s; }

        @keyframes blink {
            0%, 94%, 98%, 100% { transform: scaleY(1); }
            96% { transform: scaleY(0.05); }
        }
        .eye {
            transform-origin: center 85px;
            animation: blink 5s infinite;
        }

        /* Flame & Glow Physics */
        @keyframes flicker {
            0%, 100% { transform: scale(1) rotate(-1deg); opacity: 0.9; filter: drop-shadow(0 0 10px #FFB703); }
            25% { transform: scale(1.1) rotate(2deg); opacity: 1; filter: drop-shadow(0 0 15px #FFB703); }
            50% { transform: scale(0.9) rotate(-2deg); opacity: 0.8; filter: drop-shadow(0 0 8px #FFB703); }
            75% { transform: scale(1.05) rotate(1deg); opacity: 0.95; filter: drop-shadow(0 0 12px #FFB703); }
        }
        .animate-flicker {
            animation: flicker 0.5s infinite alternate;
            transform-origin: bottom center;
        }

        /* Animasi Asap & Tiup Lilin */
        @keyframes smokeRise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-40px) scale(3); opacity: 0; }
        }
        .animate-smoke {
            animation: smokeRise 1.2s ease-out forwards;
            transform-origin: center;
        }
        .flame-blown {
            transform: scale(0) translate(-20px, -10px) !important;
            opacity: 0 !important;
            transition: all 0.4s ease-out;
        }

        /* Sparkles */
        @keyframes sparkle-rotate {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }
        .sparkle-anim {
            animation: sparkle-rotate 2s ease-in-out infinite;
            transform-origin: center;
        }

        /* Typing & Text Glow */
        .cursor-blink {
            border-right: 3px solid #ec4899;
            animation: blink-caret 0.8s step-end infinite;
        }
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #ec4899; }
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(236, 72, 153, 0.4), 0 0 40px rgba(236, 72, 153, 0.2);
        }

        /* Dynamic Island Audio Visualizer Animation */
        .visualizer-bar {
            width: 3px; background-color: #f472b6; border-radius: 2px; height: 4px;
            transition: height 0.2s ease;
        }
        .playing .bar1 { animation: bounceBar 0.5s infinite alternate ease-in-out; }
        .playing .bar2 { animation: bounceBar 0.4s infinite alternate ease-in-out 0.2s; }
        .playing .bar3 { animation: bounceBar 0.6s infinite alternate ease-in-out 0.4s; }
        @keyframes bounceBar {
            0% { height: 4px; }
            100% { height: 14px; }
        }

        /* Overlays & Scene Transitions */
        .overlay-transition { transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 0.8s, transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); }
        .hide-overlay { opacity: 0 !important; backdrop-filter: blur(0px) !important; pointer-events: none; }
        
        .draw-circle {
            animation: drawCircle 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        @keyframes drawCircle {
            to { stroke-dashoffset: 0; }
        }

        /* Canvas z-index */
        #confetti-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
    </style>

                                <path d="M 140 95 Q 140 85 150 85 L 165 85 Q 175 85 175 95 L 175 115 Q 175 125 165 125 L 150 125 Q 140 125 140 115 Z" fill="url(#glassGlare)" stroke="#FFFFFF" stroke-width="2.5" filter="drop-shadow(0px 2px 2px rgba(0,0,0,0.05))"/>
                                <path d="M 120 100 Q 130 98 140 100" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>

                                <line x1="90" y1="95" x2="105" y2="110" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
                                <line x1="145" y1="95" x2="160" y2="110" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

                                <!-- MATA KIRI Dinamis -->
                                <g id="left-eye-pupil" style="transform-origin: 103px 108px; transition: transform 0.1s ease-out;">

                                        <circle cx="103" cy="108" r="7.5" fill="#3E2723"/>

                                    </g>
                                    <path id="le-clos" class="opacity-0 transition-opacity duration-300" d="M 97 108 Q 103 113 109 108" fill="none" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round"/>
                                </g>
                                
                                <!-- MATA KANAN Dinamis -->
                                <g id="right-eye-pupil" style="transform-origin: 157px 108px; transition: transform 0.1s ease-out;">
                                    <g id="re-norm" class="transition-opacity duration-300">
                                        <circle cx="157" cy="108" r="6" fill="#3E2723"/>

                                    </g>
                                    <g id="re-surp" class="opacity-0 transition-opacity duration-300">
                                        <circle cx="157" cy="108" r="7.5" fill="#3E2723"/>

                                    </g>
                                    <path id="re-clos" class="opacity-0 transition-opacity duration-300" d="M 151 108 Q 157 113 163 108" fill="none" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round"/>

                                </g>

                                <path d="M 96 102 Q 93 102 91 105" fill="none" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M 164 102 Q 167 102 169 105" fill="none" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round"/>
                            </g>

                            <!-- Hidung -->
                            <path d="M 128 122 Q 130 126 126 127" fill="none" stroke="#DCA293" stroke-width="2" stroke-linecap="round"/>
                            
                            <!-- MULUT Dinamis -->
                            <g id="mouth-container">
                                <g id="mouth-norm" class="transition-opacity duration-300">
                                    <path d="M 118 142 Q 130 150 142 142" fill="none" stroke="#D9777F" stroke-width="3" stroke-linecap="round"/>
                                    <path d="M 122 144 Q 130 148 138 144" fill="none" stroke="#C45C66" stroke-width="1.5" stroke-linecap="round"/>
                                </g>
                                <g id="mouth-surp" class="opacity-0 transition-opacity duration-300">
                                    <ellipse cx="130" cy="144" rx="4.5" ry="6.5" fill="#C45C66" stroke="#D9777F" stroke-width="1.5"/>
                                </g>
                                <g id="mouth-wide" class="opacity-0 transition-opacity duration-300">
                                    <path d="M 114 140 Q 130 160 146 140 Z" fill="#C45C66" stroke="#D9777F" stroke-width="2.5" stroke-linejoin="round"/>
                                    <path d="M 122 148 Q 130 156 138 148 Z" fill="#F43F5E"/>

                        </g>

                        <!-- CAKE GROUP -->
                        <g id="cake-group" style="transform: translateY(40px); opacity: 0; transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);">
                            <ellipse cx="130" cy="225" rx="85" ry="15" fill="#E5E7EB" filter="drop-shadow(0px 5px 5px rgba(0,0,0,0.1))"/>
                            <ellipse cx="130" cy="227" rx="85" ry="15" fill="#D1D5DB"/>
                            <path d="M 60 185 L 60 220 A 70 12 0 0 0 200 220 L 200 185 A 70 12 0 0 1 60 185 Z" fill="url(#cakeGrad)"/>
                            <ellipse cx="130" cy="185" rx="70" ry="12" fill="#FFF0F3"/>
                            <path d="M 60 185 Q 70 205 80 185 Q 90 200 100 185 Q 115 210 130 185 Q 145 205 160 185 Q 170 200 180 185 Q 190 205 200 185" fill="#FFF0F3" stroke="#FFF0F3" stroke-width="2" stroke-linejoin="round"/>
                            
                            <text x="130" y="215" font-family="'Fredoka', sans-serif" font-weight="600" font-size="28" fill="#FB7185" text-anchor="middle" filter="drop-shadow(1px 2px 2px rgba(255,255,255,0.6))">21</text>

                            <rect x="126" y="145" width="8" height="35" rx="3" fill="#A2D2FF" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.1))"/>
                            <line x1="126" y1="155" x2="134" y2="150" stroke="#FFFFFF" stroke-width="2"/>
                            <line x1="126" y1="165" x2="134" y2="160" stroke="#FFFFFF" stroke-width="2"/>
                            <line x1="126" y1="175" x2="134" y2="170" stroke="#FFFFFF" stroke-width="2"/>

                            <circle id="smoke1" cx="130" cy="135" r="3" fill="#D1D5DB" opacity="0"/>
                            <circle id="smoke2" cx="130" cy="132" r="5" fill="#9CA3AF" opacity="0"/>

                            <g id="flame" class="opacity-0 transition-opacity duration-500" style="transform-origin: 130px 145px;">
                                <path d="M 130 105 Q 140 130 130 138 Q 120 130 130 105 Z" fill="#FDE047" opacity="0.6" filter="url(#glow)"/>
                                <path d="M 130 112 Q 136 130 130 138 Q 124 130 130 112 Z" fill="#FB923C"/>

            </div>

            <!-- Typing Text Area -->
            <div class="text-center w-full min-h-[160px] sm:min-h-[180px] z-20 flex flex-col items-center px-2">
                <h1 class="font-title text-4xl sm:text-5xl md:text-6xl lg:text-7xl text-pink-500 mb-2 sm:mb-4 tracking-wide leading-tight text-glow transition-all duration-300" style="min-height: 4.5rem;">
                    <span id="text-bday"></span><span id="cursor-bday" class="cursor-blink inline-block w-[3px] sm:w-[4px] h-[0.9em] align-middle bg-transparent ml-1"></span>
                </h1>
                <p class="font-quicksand font-bold text-lg sm:text-xl md:text-2xl lg:text-3xl text-purple-700 drop-shadow-sm leading-relaxed max-w-xl mx-auto" style="min-height: 4rem;">
                    <span id="text-wish"></span><span id="cursor-wish" class="cursor-blink inline-block w-[2px] sm:w-[3px] h-[0.9em] align-middle bg-transparent ml-1 hidden"></span>
                </p>
            </div>
        </div>
    </div> <!-- /#main-scene -->

    <!-- Restart Button -->
    <button id="restart-btn" class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 p-3 sm:p-4 bg-white/90 backdrop-blur-md rounded-full shadow-xl text-pink-500 hover:bg-pink-100 hover:text-pink-600 hover:scale-110 transition-all duration-300 z-50 group focus:outline-none opacity-0 pointer-events-none translate-y-4" aria-label="Ulangi Animasi">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-7 sm:w-7 transform group-hover:-rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
    </button>

    <!-- Intro Overlay -->
    <div id="intro-overlay" class="absolute inset-0 bg-white/30 backdrop-blur-md z-50 flex items-center justify-center cursor-pointer overlay-transition">
        <div class="bg-white/80 backdrop-blur-lg border border-white/50 p-5 sm:p-8 rounded-3xl shadow-2xl animate-breathe text-center w-[90%] max-w-sm transform transition-transform hover:scale-105">
            <h2 class="font-title text-xl sm:text-2xl text-pink-600 mb-2">open it..</h2>
            <p class="font-quicksand font-bold text-gray-600 text-base sm:text-lg">*music nya bisa di pause & play kok</p>
        </div>
    </div>

    <script>
        // ================= DOM ELEMENTS =================
        const textBdayEl = document.getElementById('text-bday');
        const textWishEl = document.getElementById('text-wish');
        const cursorBday = document.getElementById('cursor-bday');
        const cursorWish = document.getElementById('cursor-wish');
        
        const cakeGroup = document.getElementById('cake-group');
        const flame = document.getElementById('flame');
        const smoke1 = document.getElementById('smoke1');
        const smoke2 = document.getElementById('smoke2');
        const sparkles = document.getElementById('sparkles');
        
        const leNorm = document.getElementById('le-norm');
        const leSurp = document.getElementById('le-surp');
        const leClos = document.getElementById('le-clos');
        const reNorm = document.getElementById('re-norm');
        const reSurp = document.getElementById('re-surp');
        const reClos = document.getElementById('re-clos');
        const reWink = document.getElementById('re-wink');
        const mouthNorm = document.getElementById('mouth-norm');
        const mouthSurp = document.getElementById('mouth-surp');
        const mouthWide = document.getElementById('mouth-wide');

        const parallaxWrapper = document.getElementById('parallax-wrapper');
        const introOverlay = document.getElementById('intro-overlay');
        const mainScene = document.getElementById('main-scene');
        const calendarOverlay = document.getElementById('calendar-overlay');
        const calMarker = document.getElementById('cal-marker');
        const calSparkle = document.getElementById('cal-sparkle');

        const dynamicIsland = document.getElementById('dynamic-island');
        const musicIconPath = document.getElementById('music-icon-path');
        const visualizer = document.getElementById('visualizer');
        const bgMusic = document.getElementById('bg-music');
        const blowTooltip = document.getElementById('blow-tooltip');
        const restartBtn = document.getElementById('restart-btn');
        const canvas = document.getElementById('confetti-canvas');
        const leftEye = document.getElementById('left-eye-pupil');
        const rightEye = document.getElementById('right-eye-pupil');
        const ctx = canvas.getContext('2d');

        // ================= STATE & CONFIG =================
        const bdayText = "happy 21st birthday puspita!";
        const wishText = "wish you all the best. be happy, always;)";
        const svgPlay = "M8 5v14l11-7z"; 
        const svgPause = "M6 19h4V5H6v14zm8-14v14h4V5h-4z"; 
        
        let isPlaying = false;
        let interactionStage = 0; 
        let currentSequence = 0; 
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // ================= DYNAMIC AVATAR EXPRESSIONS =================
        function setExpression(exp) {
            leNorm.classList.add('opacity-0'); leSurp.classList.add('opacity-0'); leClos.classList.add('opacity-0');
            reNorm.classList.add('opacity-0'); reSurp.classList.add('opacity-0'); reClos.classList.add('opacity-0'); reWink.classList.add('opacity-0');
            mouthNorm.classList.add('opacity-0'); mouthSurp.classList.add('opacity-0'); mouthWide.classList.add('opacity-0');

            if (exp === 'normal') {
                leNorm.classList.remove('opacity-0'); reNorm.classList.remove('opacity-0'); mouthNorm.classList.remove('opacity-0');
            } else if (exp === 'surprised') {
                leSurp.classList.remove('opacity-0'); reSurp.classList.remove('opacity-0'); mouthSurp.classList.remove('opacity-0');
            } else if (exp === 'wishing') {
                leClos.classList.remove('opacity-0'); reClos.classList.remove('opacity-0'); mouthNorm.classList.remove('opacity-0');
            } else if (exp === 'happy-wink') {
                leNorm.classList.remove('opacity-0'); reWink.classList.remove('opacity-0'); mouthWide.classList.remove('opacity-0');
            }
        }

        function updateTooltipText(text) {
            blowTooltip.style.opacity = '0';
            setTimeout(() => {
                blowTooltip.textContent = text;
                blowTooltip.style.opacity = '1';
            }, 300);
        }

        // ================= PARALLAX EFFECT =================
        function handlePointerMove(clientX, clientY) {
            if(!isPlaying || interactionStage === -1) return; // Disable during calendar
            const x = (clientX - window.innerWidth / 2);
            const y = (clientY - window.innerHeight / 2);
            
            const dampen = window.innerWidth < 768 ? 80 : 40;
            parallaxWrapper.style.transform = `translate(${x / dampen}px, ${y / dampen}px)`;

            const eyeX = (x / window.innerWidth) * 4.5;
            const eyeY = (y / window.innerHeight) * 4.5;
            leftEye.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
            rightEye.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
        }

        document.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => handlePointerMove(e.touches[0].clientX, e.touches[0].clientY));

        // ================= FIREFLIES =================
        function createFireflies() {
            const container = document.getElementById('fireflies-container');
            for(let i=0; i<30; i++) {
                const fly = document.createElement('div');
                fly.style.position = 'absolute';
                fly.style.width = Math.random() * 4 + 2 + 'px';
                fly.style.height = fly.style.width;
                fly.style.backgroundColor = '#fff';
                fly.style.borderRadius = '50%';
                fly.style.filter = 'blur(1px) drop-shadow(0 0 5px #FDE047)';
                fly.style.opacity = Math.random() * 0.5 + 0.2;
                fly.style.left = Math.random() * 100 + 'vw';
                fly.style.top = Math.random() * 100 + 'vh';
                fly.style.animation = `float-gentle ${Math.random() * 4 + 3}s ease-in-out infinite alternate`;
                fly.style.transition = 'transform 0.5s';
                container.appendChild(fly);
            }
        }
        createFireflies();

        // ================= CONFETTI ENGINE =================
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        let confettiActive = false;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.r = Math.random() * 2 + 5;
                this.dy = Math.random() * 1.5 + 2;
                this.color = ['#fca5a5', '#f9a8d4', '#c084fc', '#fef08a', '#93c5fd', '#6EE7B7'][Math.floor(Math.random() * 6)];
                this.tiltAngle = Math.random() * Math.PI;
                this.tiltAngleInc = 0.03;
                this.sway = Math.random() * Math.PI * 2;
                this.shape = Math.random() > 0.5 ? 'circle' : 'rect';
            }
            update() {
                this.tiltAngle += this.tiltAngleInc;
                this.sway += 0.02;
                this.y += this.dy;
                this.x += Math.sin(this.sway) * 1;
                this.tilt = Math.sin(this.tiltAngle) * 8;

                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.fillStyle = this.color;
                if(this.shape === 'circle') {
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2, false);
                    ctx.fill();
                } else {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.tiltAngle);
                    ctx.fillRect(-this.r, -this.r/2, this.r*2, this.r);
                    ctx.restore();
                }
            }
        }

        function renderConfetti() {
            if(!confettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(renderConfetti);
        }

        function startConfetti() {
            particles = Array.from({length: 150}, () => new Particle());
            confettiActive = true;
            renderConfetti();
        }
        function stopConfetti() {
            confettiActive = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ================= TYPEWRITER ENGINE =================
        async function typeWriter(text, element, speed = 100, sequenceId) {
            element.textContent = "";
            for (let i = 0; i < text.length; i++) {
                if (currentSequence !== sequenceId) return;
                element.textContent += text.charAt(i);
                await sleep(speed);
            }
        }

        async function backspace(element, speed = 50, sequenceId) {
            let text = element.textContent;
            while (text.length > 0) {
                if (currentSequence !== sequenceId) return;
                text = text.slice(0, -1);
                element.textContent = text;
                await sleep(speed);
            }
        }

        async function startAnimationLoop(sequenceId) {
            await sleep(500);

            while (currentSequence === sequenceId) {
                cursorBday.classList.remove('hidden'); cursorWish.classList.add('hidden');
                
                await typeWriter(bdayText, textBdayEl, 100, sequenceId);
                if (currentSequence !== sequenceId) break;
                await sleep(600);

                cursorBday.classList.add('hidden'); cursorWish.classList.remove('hidden');

                await typeWriter(wishText, textWishEl, 60, sequenceId);
                if (currentSequence !== sequenceId) break;
                
                restartBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                restartBtn.classList.add('opacity-100', 'translate-y-0');

                await sleep(5000);

                restartBtn.classList.remove('opacity-100', 'translate-y-0');
                restartBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');

                await backspace(textWishEl, 30, sequenceId);
                if (currentSequence !== sequenceId) break;

                cursorWish.classList.add('hidden'); cursorBday.classList.remove('hidden');

                await backspace(textBdayEl, 40, sequenceId);
                if (currentSequence !== sequenceId) break;
                
                await sleep(500);
            }
        }

        // ================= INTERACTION SEQUENCE =================

        // 1. Calendar Storyline Sequence
        function startCalendarSequence() {
            introOverlay.classList.add('hide-overlay');
            isPlaying = true;
            interactionStage = -1; // -1 = mode storyline, interaksi avatar belum aktif
            
            // Nyalakan musik pelan saat storyline
            bgMusic.play().catch(e => console.log(e));
            musicIconPath.setAttribute('d', svgPause);
            visualizer.classList.add('playing');

            // Tampilkan kalender
            calendarOverlay.style.display = 'flex';
            
            setTimeout(() => {
                calendarOverlay.classList.remove('opacity-0', 'scale-90');
                calendarOverlay.classList.add('opacity-100', 'scale-100');
            }, 50);

            // Animasi Lingkaran Tanggal
            setTimeout(() => {
                calMarker.classList.add('draw-circle');
            }, 1000);

            // Munculkan sparkle kecil sesaat setelah dilingkari
            setTimeout(() => {
                calSparkle.classList.remove('opacity-0');
            }, 1800);

            // Zoom In Kalender & Fade-in Kamar
            setTimeout(() => {
                // Zoom Ekstrim
                calendarOverlay.classList.remove('scale-100');
                calendarOverlay.classList.add('scale-[4]', 'opacity-0'); // Memudar sambil membesar

                // Kamar Muncul
                mainScene.classList.remove('opacity-0', 'pointer-events-none');
                
                // Set Up Interaksi Kamar
                setTimeout(() => {
                    calendarOverlay.style.display = 'none'; // bersihkan dari DOM
                    interactionStage = 0; // Stage menyiapkan kue
                    dynamicIsland.classList.remove('opacity-0');
                    blowTooltip.classList.remove('opacity-0');
                }, 1000);
            }, 3000);
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.play().catch(err => console.log("Audio play failed:", err));
                musicIconPath.setAttribute('d', svgPause);
                visualizer.classList.add('playing');
            } else {
                bgMusic.pause();
                musicIconPath.setAttribute('d', svgPlay);
                visualizer.classList.remove('playing');
            }
        }

        // 2. Avatar Cake Interactions
        async function handleAvatarInteraction() {
            if (!isPlaying || interactionStage === -1) return;

            if (interactionStage === 0) { // STAGE 1: MUNCULKAN KUE
                cakeGroup.style.transform = 'translateY(0px)';
                cakeGroup.style.opacity = '1';
                setExpression('surprised');
                updateTooltipText("udh muncul kan! nyalain lilinnya dulu..");
                interactionStage = 1;
                setTimeout(() => { if (interactionStage === 1) setExpression('normal'); }, 1500);
            } 
            else if (interactionStage === 1) { // STAGE 2: NYALAKAN LILIN
                flame.classList.remove('opacity-0');
                flame.classList.add('animate-flicker');
                setExpression('wishing');
                updateTooltipText("make a wish... tiup deh lilinnya!");
                interactionStage = 2;
            } 
            else if (interactionStage === 2) { // STAGE 3: TIUP LILIN & CELEBRATE
                interactionStage = 3;
                blowTooltip.style.opacity = '0';
                
                flame.classList.remove('animate-flicker');
                flame.classList.add('flame-blown');
                smoke1.classList.add('animate-smoke');
                setTimeout(() => smoke2.classList.add('animate-smoke'), 200);

                setExpression('happy-wink');
                sparkles.classList.remove('opacity-0');

                await sleep(800);
                startConfetti();

                currentSequence++;
                startAnimationLoop(currentSequence);
            }
        }

        function resetAnimation() {
            currentSequence++;
            isPlaying = false;
            interactionStage = -1;
            
            // Audio Stop
            bgMusic.pause();
            bgMusic.currentTime = 0;
            musicIconPath.setAttribute('d', svgPlay);
            visualizer.classList.remove('playing');
            dynamicIsland.classList.add('opacity-0'); 

            stopConfetti();

            // Reset Scene Visibility
            mainScene.classList.add('opacity-0', 'pointer-events-none');
            
            // Reset Calendar
            calendarOverlay.style.display = 'none';
            calendarOverlay.classList.remove('opacity-100', 'scale-100', 'scale-[4]', 'opacity-0');
            calendarOverlay.classList.add('opacity-0', 'scale-90');
            calMarker.classList.remove('draw-circle');
            calSparkle.classList.add('opacity-0');

            // Reset Cake & Avatar
            cakeGroup.style.transform = 'translateY(40px)';
            cakeGroup.style.opacity = '0';
            flame.classList.remove('flame-blown');
            flame.classList.add('opacity-0');
            flame.classList.remove('animate-flicker');
            smoke1.classList.remove('animate-smoke');
            smoke2.classList.remove('animate-smoke');
            sparkles.classList.add('opacity-0');

            setExpression('normal');
            blowTooltip.textContent = "Klik untuk menyiapkan kue! 🎂";
            blowTooltip.style.opacity = '0'; 

            parallaxWrapper.style.transform = `translate(0px, 0px)`;
            leftEye.style.transform = `translate(0px, 0px)`;
            rightEye.style.transform = `translate(0px, 0px)`;

            textBdayEl.textContent = "";
            textWishEl.textContent = "";
            cursorBday.classList.remove('hidden');
            cursorWish.classList.add('hidden');
            restartBtn.classList.remove('opacity-100', 'translate-y-0');
            restartBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');

            // Kembalikan Intro Overlay
            introOverlay.classList.remove('hide-overlay');
        }

        // ================= LISTENERS =================
        introOverlay.addEventListener('click', startCalendarSequence);
        dynamicIsland.addEventListener('click', toggleMusic);
        document.getElementById('character-container').addEventListener('click', handleAvatarInteraction);
