    <style>
        /* Typography */
        .font-title { font-family: 'Fredoka', sans-serif; }
        .font-quicksand { font-family: 'Quicksand', sans-serif; }
        .font-code { font-family: 'Fira Code', monospace; }

        /* Animated Mesh Gradient Background */
        body {
            background: linear-gradient(-45deg, #fce4ec, #f3e5f5, #fff0f5, #e8eaf6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Fluid Animations */
        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.01); } }
        .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: bottom center; }

        @keyframes float-gentle { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        .animate-float { animation: float-gentle 6s ease-in-out infinite; }

        @keyframes float-zzz { 0% { transform: translateY(0) scale(0.8) rotate(-5deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-30px) scale(1.2) rotate(5deg); opacity: 0; } }
        .anim-zzz { animation: float-zzz 3s infinite linear; }

        /* Background Floating Items */
        @keyframes float-bg { 0%, 100% { transform: translateY(0px) rotate(var(--r-start)); } 50% { transform: translateY(-15px) rotate(var(--r-end)); } }
        .animate-float-bg { animation: float-bg 9s ease-in-out infinite; }
        .animate-float-bg-delayed { animation: float-bg 12s ease-in-out infinite 2.5s; }
        .animate-float-bg-slow { animation: float-bg 14s ease-in-out infinite 1s; }

        /* Flame & Asap Physics */
        @keyframes flicker { 0%, 100% { transform: scale(1) rotate(-1deg); filter: drop-shadow(0 0 10px #FFB703); } 50% { transform: scale(0.9) rotate(2deg); filter: drop-shadow(0 0 15px #FFB703); } }
        .animate-flicker { animation: flicker 0.5s infinite alternate; transform-origin: bottom center; }

        @keyframes smokeRise { 0% { transform: translateY(0) scale(1); opacity: 0.8; } 100% { transform: translateY(-40px) scale(3); opacity: 0; } }
        .animate-smoke { animation: smokeRise 1.2s ease-out forwards; transform-origin: center; }
        .flame-blown { transform: scale(0) translate(-20px, -10px) !important; opacity: 0 !important; transition: all 0.4s ease-out; }

        /* Sparkles & Typing */
        @keyframes sparkle-rotate { 0%, 100% { transform: scale(0) rotate(0deg); opacity: 0; } 50% { transform: scale(1) rotate(180deg); opacity: 1; } }
        .sparkle-anim { animation: sparkle-rotate 2s ease-in-out infinite; transform-origin: center; }

        .cursor-blink { border-right: 3px solid #ec4899; animation: blink-caret 0.8s step-end infinite; }
        @keyframes blink-caret { from, to { border-color: transparent; } 50% { border-color: #ec4899; } }
        .text-glow { text-shadow: 0 0 20px rgba(236, 72, 153, 0.4), 0 0 40px rgba(236, 72, 153, 0.2); }

        /* Audio Visualizer */
        .visualizer-bar { width: 3px; background-color: #f472b6; border-radius: 2px; height: 4px; transition: height 0.2s ease; }
        .playing .bar1 { animation: bounceBar 0.5s infinite alternate ease-in-out; }
        .playing .bar2 { animation: bounceBar 0.4s infinite alternate ease-in-out 0.2s; }
        .playing .bar3 { animation: bounceBar 0.6s infinite alternate ease-in-out 0.4s; }
        @keyframes bounceBar { 0% { height: 4px; } 100% { height: 14px; } }

        /* Overlays & Transitions */
        .overlay-transition { transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), backdrop-filter 1s, transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); }
        .hide-overlay { opacity: 0 !important; backdrop-filter: blur(0px) !important; pointer-events: none; }
        
        .draw-circle { animation: drawCircle 1s cubic-bezier(0.65, 0, 0.35, 1) forwards; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }

        /* Night Sky Storytelling */
        .star-twinkle { animation: twinkle 3s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 6px white); } }
        .draw-line { animation: drawLine 3s ease-in-out forwards; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        .shooting-star { position: absolute; top: 10%; left: 80%; width: 100px; height: 2px; background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%); filter: drop-shadow(0 0 5px white); transform: rotate(-45deg); opacity: 0; }
        .animate-shooting-star { animation: shootStar 2s ease-in-out forwards; }
        @keyframes shootStar { 0% { transform: translate(0, 0) rotate(-45deg) scale(1); opacity: 1; } 100% { transform: translate(-400px, 400px) rotate(-45deg) scale(0.2); opacity: 0; } }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    </style>

        const textBdayEl = document.getElementById('text-bday'); const textWishEl = document.getElementById('text-wish');

        const countdownOverlay = document.getElementById('countdown-overlay'); const countdownSec = document.getElementById('countdown-sec'); const countdownClock = document.getElementById('countdown-clock'); const countdownText = document.getElementById('countdown-text');
        const calendarOverlay = document.getElementById('calendar-overlay'); const calMarker = document.getElementById('cal-marker'); const calSparkle = document.getElementById('cal-sparkle'); const calText = document.getElementById('cal-text');
        
        const mainScene = document.getElementById('main-scene'); const parallaxWrapper = document.getElementById('parallax-wrapper');
        const dynamicIsland = document.getElementById('dynamic-island'); const btnPlay = document.getElementById('btn-play'); const btnPrev = document.getElementById('btn-prev'); const btnNext = document.getElementById('btn-next');
        const musicIconPath = document.getElementById('music-icon-path'); const visualizer = document.getElementById('visualizer'); const trackTitle = document.getElementById('track-title'); const trackArtist = document.getElementById('track-artist');
        
        const blowTooltip = document.getElementById('blow-tooltip'); const restartBtn = document.getElementById('restart-btn');
        const canvas = document.getElementById('confetti-canvas'); const leftEye = document.getElementById('left-eye-pupil'); const rightEye = document.getElementById('right-eye-pupil');
        const ctx = canvas.getContext('2d'); const bgMusic = document.getElementById('bg-music');

        const bdayText = "happy 21st birthday puspita!"; const wishText = "wish you all the best. be happy, always;)";
        const svgPlay = "M8 5v14l11-7z"; const svgPause = "M6 19h4V5H6v14zm8-14v14h4V5h-4z"; 
        
        const playlist = [ { title: "21", artist: "Hunter Hayes", src: "music-2.mpeg" }, { title: "Have It All", artist: "Jason Mraz", src: "music-4.mpeg" }, { title: "Birthday", artist: "Sufjan Stevens", src: "music.mpeg" } ];
        let currentSongIndex = 0; let isPlaying = false; let interactionStage = -4; let currentSequence = 0; 
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function loadSong(index) {
            bgMusic.src = playlist[index].src; trackTitle.textContent = playlist[index].title; trackArtist.textContent = playlist[index].artist;
            if (visualizer.classList.contains('playing')) bgMusic.play().catch(e => console.log(e));
        }
        function toggleMusic(e) {
            if (e) e.stopPropagation();
            if (bgMusic.paused) { bgMusic.play().catch(err => console.log(err)); musicIconPath.setAttribute('d', svgPause); visualizer.classList.add('playing'); } 
            else { bgMusic.pause(); musicIconPath.setAttribute('d', svgPlay); visualizer.classList.remove('playing'); }
        }
        btnPlay.addEventListener('click', toggleMusic);
        btnPrev.addEventListener('click', (e) => { e.stopPropagation(); currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length; loadSong(currentSongIndex); });
        btnNext.addEventListener('click', (e) => { e.stopPropagation(); currentSongIndex = (currentSongIndex + 1) % playlist.length; loadSong(currentSongIndex); });
        loadSong(currentSongIndex);

        function showTooltip(text) { blowTooltip.textContent = text; blowTooltip.classList.remove('opacity-0'); }
        function hideTooltip() { blowTooltip.classList.add('opacity-0'); }

        function setExpression(exp) {
            leNorm.classList.add('opacity-0'); leSurp.classList.add('opacity-0'); leClos.classList.add('opacity-0'); leDizzy.classList.add('opacity-0');
            reNorm.classList.add('opacity-0'); reSurp.classList.add('opacity-0'); reClos.classList.add('opacity-0'); reWink.classList.add('opacity-0'); reDizzy.classList.add('opacity-0');
            mouthRest.classList.add('opacity-0'); mouthNorm.classList.add('opacity-0'); mouthSurp.classList.add('opacity-0'); mouthWide.classList.add('opacity-0');
            sleepZzz.classList.add('opacity-0');

            if (exp === 'sleeping') { leClos.classList.remove('opacity-0'); reClos.classList.remove('opacity-0'); mouthRest.classList.remove('opacity-0'); sleepZzz.classList.remove('opacity-0'); } 
            else if (exp === 'dizzy') { leDizzy.classList.remove('opacity-0'); reDizzy.classList.remove('opacity-0'); mouthRest.classList.remove('opacity-0'); } 
            else if (exp === 'normal') { leNorm.classList.remove('opacity-0'); reNorm.classList.remove('opacity-0'); mouthNorm.classList.remove('opacity-0'); } 
            else if (exp === 'surprised') { leSurp.classList.remove('opacity-0'); reSurp.classList.remove('opacity-0'); mouthSurp.classList.remove('opacity-0'); } 
            else if (exp === 'wishing') { leClos.classList.remove('opacity-0'); reClos.classList.remove('opacity-0'); mouthNorm.classList.remove('opacity-0'); } 
            else if (exp === 'happy-wink') { leNorm.classList.remove('opacity-0'); reWink.classList.remove('opacity-0'); mouthWide.classList.remove('opacity-0'); }
        }

        function handlePointerMove(clientX, clientY) {
            if(!isPlaying || interactionStage < 0) return; 
            const x = (clientX - window.innerWidth / 2); const y = (clientY - window.innerHeight / 2);
            const dampen = window.innerWidth < 768 ? 80 : 40; parallaxWrapper.style.transform = `translate(${x / dampen}px, ${y / dampen}px)`;
            
            // Pupil mata normal tracking (kecuali saat scene terkejut akhir)
            if(interactionStage !== 6) {
                const eyeX = (x / window.innerWidth) * 4.5; const eyeY = (y / window.innerHeight) * 4.5;
                leftEye.style.transform = `translate(${eyeX}px, ${eyeY}px)`; rightEye.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
            }
        }
        document.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => handlePointerMove(e.touches[0].clientX, e.touches[0].clientY));

        function createFireflies() {
            const container = document.getElementById('fireflies-container');
            for(let i=0; i<30; i++) {
                const fly = document.createElement('div'); fly.style.position = 'absolute'; fly.style.width = Math.random() * 4 + 2 + 'px'; fly.style.height = fly.style.width; fly.style.backgroundColor = '#fff'; fly.style.borderRadius = '50%'; fly.style.filter = 'blur(1px) drop-shadow(0 0 5px #FDE047)'; fly.style.opacity = Math.random() * 0.5 + 0.2; fly.style.left = Math.random() * 100 + 'vw'; fly.style.top = Math.random() * 100 + 'vh'; fly.style.animation = `float-gentle ${Math.random() * 4 + 3}s ease-in-out infinite alternate`; container.appendChild(fly);
            }
        }
        createFireflies();

        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = []; let confettiActive = false;
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height; this.r = Math.random() * 2 + 5; this.dy = Math.random() * 1.5 + 2; this.color = ['#fca5a5', '#f9a8d4', '#c084fc', '#fef08a', '#93c5fd', '#6EE7B7'][Math.floor(Math.random() * 6)]; this.tiltAngle = Math.random() * Math.PI; this.tiltAngleInc = 0.03; this.sway = Math.random() * Math.PI * 2; this.shape = Math.random() > 0.5 ? 'circle' : 'rect';
            }
            update() { this.tiltAngle += this.tiltAngleInc; this.sway += 0.02; this.y += this.dy; this.x += Math.sin(this.sway) * 1; this.tilt = Math.sin(this.tiltAngle) * 8; if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; } }
            draw() { ctx.beginPath(); ctx.fillStyle = this.color; if(this.shape === 'circle') { ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2, false); ctx.fill(); } else { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.tiltAngle); ctx.fillRect(-this.r, -this.r/2, this.r*2, this.r); ctx.restore(); } }
        }
        function renderConfetti() { if(!confettiActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(renderConfetti); }
        function startConfetti() { particles = Array.from({length: 170}, () => new Particle()); confettiActive = true; renderConfetti(); }
        function stopConfetti() { confettiActive = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }

        async function typeWriter(text, element, speed = 100, sequenceId) {
            element.textContent = ""; for (let i = 0; i < text.length; i++) { if (currentSequence !== sequenceId) return; element.textContent += text.charAt(i); await sleep(speed); }
        }
        async function backspace(element, speed = 50, sequenceId) {
            let text = element.textContent; while (text.length > 0) { if (currentSequence !== sequenceId) return; text = text.slice(0, -1); element.textContent = text; await sleep(speed); }
        }

        async function startAnimationLoop(sequenceId) {
            await sleep(500);
            while (currentSequence === sequenceId) {
                cursorBday.classList.remove('hidden'); cursorWish.classList.add('hidden');
                await typeWriter(bdayText, textBdayEl, 100, sequenceId);
                if (currentSequence !== sequenceId) break; await sleep(600);

                cursorBday.classList.add('hidden'); cursorWish.classList.remove('hidden');
                await typeWriter(wishText, textWishEl, 60, sequenceId);
                if (currentSequence !== sequenceId) break;
                
                restartBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4'); restartBtn.classList.add('opacity-100', 'translate-y-0');
                await sleep(6000);

                restartBtn.classList.remove('opacity-100', 'translate-y-0'); restartBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                await backspace(textWishEl, 30, sequenceId);
                if (currentSequence !== sequenceId) break;

                cursorWish.classList.add('hidden'); cursorBday.classList.remove('hidden');
                await backspace(textBdayEl, 40, sequenceId);
                if (currentSequence !== sequenceId) break; await sleep(500);
            }
        }

        async function startMovieSequence() {
            introOverlay.classList.add('hide-overlay'); isPlaying = true; interactionStage = -5;
            
            bgMusic.play().catch(e => console.log(e)); musicIconPath.setAttribute('d', svgPause); visualizer.classList.add('playing');

            nightSkyOverlay.style.display = 'flex'; setTimeout(() => nightSkyOverlay.classList.remove('opacity-0'), 50);
            await sleep(800); skyText.classList.remove('opacity-0');
            await sleep(1500); constellationPath.classList.add('draw-line'); 
            await sleep(3500); skyText.classList.add('opacity-0');
            await sleep(800); shootingStar.classList.add('animate-shooting-star');
            // skyText.textContent = "Sebuah doa tulus diterbangkan menembus waktu..."; skyText.classList.remove('opacity-0');
            await sleep(3000); skyText.classList.add('opacity-0'); nightSkyOverlay.classList.add('opacity-0');

            interactionStage = -3; countdownOverlay.style.display = 'flex';
            setTimeout(() => { nightSkyOverlay.style.display = 'none'; countdownOverlay.classList.remove('opacity-0'); }, 1000);
            
            await sleep(1500); countdownSec.textContent = "58";
            await sleep(1000); countdownSec.textContent = "59";
            await sleep(1000);
            countdownClock.innerHTML = "00:00:<span class='text-pink-500'>00</span>"; countdownClock.classList.add('scale-110', 'text-pink-300');
            countdownText.innerHTML = "<span class='font-title text-2xl text-pink-400 mt-2 inline-block'>22 MEI 2026</span>";
            await sleep(3000); countdownOverlay.classList.add('opacity-0');

            interactionStage = -2; calendarOverlay.style.display = 'flex';
            setTimeout(() => { countdownOverlay.style.display = 'none'; calendarOverlay.classList.remove('opacity-0', 'scale-90'); calendarOverlay.classList.add('opacity-100', 'scale-100'); }, 1000);

            await sleep(1500); calMarker.classList.add('draw-circle');
            await sleep(800); calSparkle.classList.remove('opacity-0');
            await sleep(1500); calText.classList.remove('opacity-0');
            await sleep(2000); calText.classList.add('opacity-0');

            calendarOverlay.classList.remove('scale-100'); calendarOverlay.classList.add('scale-[4]', 'opacity-0'); 

            mainScene.classList.remove('opacity-0', 'pointer-events-none');
            await sleep(1000); calendarOverlay.style.display = 'none';
            
            interactionStage = 0; setExpression('sleeping'); dynamicIsland.classList.remove('opacity-0');
            showTooltip("ceritanya lg ketiduran nungguin ultahnya.. tap pelan-pelan deh");
        }

        async function handleAvatarInteraction() {
            if (!isPlaying || interactionStage < 0) return;

            if (interactionStage === 0) { 
                setExpression('dizzy'); showTooltip("masi blm kumpul nyawa nya wkw tap lg coba!"); interactionStage = 1;
            } else if (interactionStage === 1) { 
                setExpression('normal'); showTooltip("nah sudah seger kan.. skrg tap buat panggil kado kejutannya!"); interactionStage = 2;
            } else if (interactionStage === 2) { 
                cakeGroup.style.transform = 'translateY(0px)'; cakeGroup.style.opacity = '1'; setExpression('surprised');
                showTooltip("tap lg buat nyalain lilin nya ya"); interactionStage = 3;
            } else if (interactionStage === 3) { 
                setExpression('normal'); flame.classList.remove('opacity-0'); flame.classList.add('animate-flicker');
                showTooltip("make a wish.."); interactionStage = 4;
            } else if (interactionStage === 4) { 
                setExpression('wishing'); showTooltip("ready? skrg tiup lilinnya!"); interactionStage = 5;
            } else if (interactionStage === 5) { 
                interactionStage = 6; hideTooltip();
                
                flame.classList.remove('animate-flicker'); flame.classList.add('flame-blown');
                smoke1.classList.add('animate-smoke'); setTimeout(() => smoke2.classList.add('animate-smoke'), 200);

                setExpression('happy-wink'); sparkles.classList.remove('opacity-0');
                await sleep(800); startConfetti();
                currentSequence++; startAnimationLoop(currentSequence);

                await sleep(2000);
                
                // Teman Slide In
                friendsLeft.classList.remove('opacity-0', '-translate-x-12'); friendsLeft.classList.add('opacity-100', 'translate-x-0');
                friendsRight.classList.remove('opacity-0', 'translate-x-12'); friendsRight.classList.add('opacity-100', 'translate-x-0');
                
                // PLOT TWIST: Kaget melihat ke teman cowok di kiri
                setExpression('surprised');
                leftEye.style.transform = 'translate(-8px, -1px)';
                rightEye.style.transform = 'translate(-8px, -1px)';
                
                setTimeout(() => { document.querySelectorAll('.friends-speech').forEach(el => el.classList.remove('opacity-0')); }, 500);

                // Setelah terkejut, kembali senyum & wink 
                await sleep(2500);
                leftEye.style.transform = 'translate(0px, 0px)';
                rightEye.style.transform = 'translate(0px, 0px)';
                setExpression('happy-wink');
            }
        }

        function resetAnimation() {
            currentSequence++; isPlaying = false; interactionStage = -4;
            bgMusic.pause(); bgMusic.currentTime = 0; musicIconPath.setAttribute('d', svgPlay); visualizer.classList.remove('playing'); dynamicIsland.classList.add('opacity-0'); stopConfetti();
            mainScene.classList.add('opacity-0', 'pointer-events-none');
            
            calendarOverlay.style.display = 'none'; calendarOverlay.classList.remove('opacity-100', 'scale-100', 'scale-[4]', 'opacity-0'); calendarOverlay.classList.add('opacity-0', 'scale-90');
            calMarker.classList.remove('draw-circle'); calSparkle.classList.add('opacity-0'); calText.classList.add('opacity-0');

            countdownOverlay.style.display = 'none'; countdownOverlay.classList.remove('opacity-100'); countdownSec.textContent = "57";
            countdownClock.innerHTML = "23:59:<span id='countdown-sec'>57</span>"; countdownClock.classList.remove('scale-110', 'text-pink-300');
            countdownText.textContent = "Menghitung mundur detik-detik berharga menuju hari kelahiranmu...";

            nightSkyOverlay.style.display = 'none'; nightSkyOverlay.classList.remove('opacity-100', 'opacity-0');
            constellationPath.classList.remove('draw-line'); shootingStar.classList.remove('animate-shooting-star');
            skyText.textContent = "Di bawah rasi bintang Gemini yang bersinar..."; skyText.classList.add('opacity-0');

            cakeGroup.style.transform = 'translateY(-150px)'; cakeGroup.style.opacity = '0'; flame.classList.remove('flame-blown'); flame.classList.add('opacity-0'); flame.classList.remove('animate-flicker'); smoke1.classList.remove('animate-smoke'); smoke2.classList.remove('animate-smoke'); sparkles.classList.add('opacity-0');
            
            friendsLeft.classList.add('opacity-0', '-translate-x-12'); friendsLeft.classList.remove('opacity-100', 'translate-x-0');
            friendsRight.classList.add('opacity-0', 'translate-x-12'); friendsRight.classList.remove('opacity-100', 'translate-x-0');
            document.querySelectorAll('.friends-speech').forEach(el => el.classList.add('opacity-0'));

            setExpression('sleeping'); hideTooltip();

            parallaxWrapper.style.transform = `translate(0px, 0px)`; leftEye.style.transform = `translate(0px, 0px)`; rightEye.style.transform = `translate(0px, 0px)`;
            textBdayEl.textContent = ""; textWishEl.textContent = ""; cursorBday.classList.remove('hidden'); cursorWish.classList.add('hidden');
            restartBtn.classList.remove('opacity-100', 'translate-y-0'); restartBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');

            introOverlay.classList.remove('hide-overlay');
        }

        introOverlay.addEventListener('click', startMovieSequence);
        document.getElementById('character-container').addEventListener('click', handleAvatarInteraction);
        restartBtn.addEventListener('click', resetAnimation);
    </script>
</body>
</html>
